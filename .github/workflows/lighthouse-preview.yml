name: Lighthouse Preview

on:
  check_run:
    types:
      - completed

concurrency:
  group: lighthouse-preview-${{ github.event.check_run.check_suite.head_sha }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  lighthouse:
    name: Lighthouse preview
    if: >-
      github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
      github.event.check_run.name == 'Cloudflare Pages' &&
      github.event.check_run.status == 'completed' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.check_suite != null &&
      github.event.check_run.check_suite.head_branch != null &&
      github.event.check_run.check_suite.head_branch !=
      github.event.repository.default_branch &&
      github.event.check_run.check_suite.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Extract Cloudflare Pages preview URL
        id: preview
        run: |
          set -euo pipefail

          check_run_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/check-runs/${CHECK_RUN_ID}"
          )"

          preview_url="$(
            jq -r '
              try (
                .output.summary
                | capture("<strong>Preview URL:</strong></td><td>[\\s\\S]*?<a href=['\''\"](?<url>[^'\''\"]+\\.pages\\.dev)['\''\"]"; "i")
                | .url
              ) catch ""
            ' <<< "${check_run_json}"
          )"

          if [[ -z "${preview_url}" ]]; then
            echo "::error::Cloudflare Pages preview URL was not found in check run output."
            exit 1
          fi

          pr_number="$(
            jq -r '.pull_requests[0].number // empty' <<< "${check_run_json}"
          )"

          if [[ -z "${pr_number}" ]]; then
            echo "::error::No pull request was associated with this check run."
            exit 1
          fi

          pr_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}"
          )"

          pr_head_repo="$(
            jq -r '.head.repo.full_name' <<< "${pr_json}"
          )"

          current_head_sha="$(
            jq -r '.head.sha' <<< "${pr_json}"
          )"

          if [[ "${pr_head_repo}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "::notice::Skip Lighthouse for fork PR: ${pr_head_repo}"
            exit 0
          fi

          if [[ "${current_head_sha}" != "${HEAD_SHA}" ]]; then
            echo "::notice::Skip Lighthouse because PR head changed from ${HEAD_SHA} to ${current_head_sha}."
            exit 0
          fi

          echo "Found preview URL: ${preview_url}"
          echo "url=${preview_url}" >> "${GITHUB_OUTPUT}"
          echo "pr-number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "sha=${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_RUN_ID: ${{ github.event.check_run.id }}
          HEAD_SHA: ${{ github.event.check_run.check_suite.head_sha }}

      - name: Run Lighthouse
        if: steps.preview.outputs.url != ''
        run: |
          mkdir -p .tmp/lighthouse
          npx --yes lighthouse@13.1.0 "${PREVIEW_URL}" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output=html \
            --output-path=.tmp/lighthouse/report \
            --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage"
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}

      - name: Upload Lighthouse report
        if: steps.preview.outputs.url != ''
        id: upload-report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ steps.preview.outputs.pr-number }}
          path: .tmp/lighthouse/
          if-no-files-found: error
          retention-days: 14

      - name: Comment Lighthouse score
        if: steps.preview.outputs.url != ''
        run: |
          set -euo pipefail

          current_head_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha'
          )"

          if [[ "${current_head_sha}" != "${DEPLOYMENT_SHA}" ]]; then
            echo "::warning::Skip Lighthouse comment because PR head changed from ${DEPLOYMENT_SHA} to ${current_head_sha}."
            exit 0
          fi

          report_json=".tmp/lighthouse/report.report.json"
          marker="<!-- lighthouse-preview-report -->"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          score() {
            jq -r --arg category "${1}" '.categories[$category].score * 100 | round' "${report_json}"
          }

          display_value() {
            jq -r --arg audit_id "${1}" '.audits[$audit_id].displayValue // "n/a"' "${report_json}"
          }

          {
            echo "## Lighthouse Preview"
            echo
            echo "Target: ${PREVIEW_URL}"
            echo
            echo "| Category | Score |"
            echo "| --- | ---: |"
            echo "| Performance | $(score "performance") |"
            echo "| Accessibility | $(score "accessibility") |"
            echo "| Best Practices | $(score "best-practices") |"
            echo "| SEO | $(score "seo") |"
            echo
            echo "| Metric | Value |"
            echo "| --- | ---: |"
            echo "| First Contentful Paint | $(display_value "first-contentful-paint") |"
            echo "| Largest Contentful Paint | $(display_value "largest-contentful-paint") |"
            echo "| Total Blocking Time | $(display_value "total-blocking-time") |"
            echo "| Cumulative Layout Shift | $(display_value "cumulative-layout-shift") |"
            echo "| Speed Index | $(display_value "speed-index") |"
            echo
            echo "[Lighthouse report artifact](${ARTIFACT_URL})"
            echo "[Workflow run](${run_url})"
          } > .tmp/lighthouse/summary.md

          cat .tmp/lighthouse/summary.md >> "${GITHUB_STEP_SUMMARY}"
          printf "%s\n" "${marker}" > .tmp/lighthouse/comment.md
          cat .tmp/lighthouse/summary.md >> .tmp/lighthouse/comment.md

          existing_comment_id="$(
            gh api \
              --method GET \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --slurp \
              --field per_page=100 \
              --jq '
                flatten
                | map(select(.user.type == "Bot" and (.body | contains("<!-- lighthouse-preview-report -->"))))
                | first
                | .id // ""
              '
          )"

          jq -n --rawfile body .tmp/lighthouse/comment.md '{body: $body}' > .tmp/lighthouse/comment-payload.json

          if [[ -n "${existing_comment_id}" ]]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_comment_id}" \
              --input .tmp/lighthouse/comment-payload.json >/dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input .tmp/lighthouse/comment-payload.json >/dev/null
          fi
        env:
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          DEPLOYMENT_SHA: ${{ steps.preview.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.preview.outputs.pr-number }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
